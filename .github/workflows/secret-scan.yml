name: Secret Scan

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan tracked files for credential leaks
        shell: bash
        run: |
          set -euo pipefail

          blocked_name_regex='(service-account.*\.json$|credentials?.*\.json$|firebase-adminsdk.*\.json$|\.pem$|\.p12$|\.pfx$|(^|/)id_rsa$|(^|/)id_dsa$)'
          content_regex='("private_key"\s*:|-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----|"client_email"\s*:\s*"[^"]+\.gserviceaccount\.com")'

          has_error=0

          while IFS= read -r -d '' file; do
            if [[ "$file" =~ $blocked_name_regex ]]; then
              echo "::error file=$file::Committed sensitive filename is not allowed. Use Secrets Manager/CI secrets instead."
              has_error=1
            fi

            if grep -IEn "$content_regex" "$file" > /tmp/secret_hits.txt 2>/dev/null; then
              while IFS= read -r hit; do
                line_no="${hit%%:*}"
                echo "::error file=$file,line=$line_no::Potential credential material detected."
              done < /tmp/secret_hits.txt
              has_error=1
            fi
          done < <(git ls-files -z)

          if [[ "$has_error" -ne 0 ]]; then
            echo "Secret scan failed."
            exit 1
          fi

          echo "Secret scan passed."
