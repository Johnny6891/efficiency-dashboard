name: Sync Efficiency Stats

on:
  workflow_dispatch:
    inputs:
      sync_scope:
        description: "Sync scope"
        required: true
        default: all_years
        type: choice
        options:
          - all_years
          - current_year
  schedule:
    - cron: "0 23 * * *" # Asia/Taipei 07:00

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: sync-efficiency
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Debug credential projects
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: |
          node -e "
            function printCred(name, raw) {
              try {
                const c = JSON.parse(raw || '{}');
                console.log(name + ' project_id=' + (c.project_id || '<missing>'));
                console.log(name + ' client_email=' + (c.client_email || '<missing>'));
              } catch (e) {
                console.error(name + ' JSON parse failed:', e.message);
                process.exitCode = 1;
              }
            }
            printCred('GOOGLE_CREDENTIALS', process.env.GOOGLE_CREDENTIALS);
            printCred('FIREBASE_CREDENTIALS', process.env.FIREBASE_CREDENTIALS);
          "

      - name: Run sync
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
          REF_SHEET_ID: ${{ secrets.REF_SHEET_ID }}
          REF_SHEET_NAME: "\u52FF\u4FEE\u6539/\u5168\u90E8\u540C\u4E8BDATA"
          REF_GROUP_HEADER: "\u7D44\u5225"
          REF_STATUS_HEADER: "\u72C0\u614B(1\u8868\u793A\u986F\u793A0\u4E0D\u986F\u793A)"
          REF_NAME_HEADER: "\u4EBA\u54E1\u540D\u7A31"
          INCLUDE_GROUP: "2"
          INCLUDE_STATUS: "1"
          DATA_SHEETS_JSON: ${{ secrets.DATA_SHEETS_JSON }}
          FIRESTORE_COLLECTION: "efficiency_stats"
          COL_COLLEAGUE: "43"
          COL_DATE: "50"
          COL_PRODUCTION_HOURS: "53"
          COL_BF: "57"
          SYNC_SCOPE: ${{ github.event_name == 'schedule' && 'current_year' || github.event.inputs.sync_scope || 'all_years' }}
        run: |
          node -e "const { runSync } = require('./index'); runSync().then(r => { console.log(JSON.stringify(r, null, 2)); process.exit(0); }).catch(e => { console.error(e); process.exit(1); });"
