name: Sync Efficiency Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 17 * * *" # Asia/Taipei 01:00

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: sync-efficiency
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run sync
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
          REF_SHEET_ID: ${{ secrets.REF_SHEET_ID }}
          REF_SHEET_NAME: "勿修改/全部同事DATA"
          REF_GROUP_HEADER: "組別"
          REF_STATUS_HEADER: "狀態"
          REF_NAME_HEADER: "同事名稱"
          INCLUDE_GROUP: "2"
          INCLUDE_STATUS: "1"
          DATA_SHEETS_JSON: ${{ secrets.DATA_SHEETS_JSON }}
          FIRESTORE_COLLECTION: "efficiency_stats"
          COL_COLLEAGUE: "43"
          COL_DATE: "50"
          COL_PRODUCTION_HOURS: "53"
          COL_BF: "57"
        run: |
          node -e "const { runSync } = require('./index'); runSync().then(r => { console.log(JSON.stringify(r, null, 2)); process.exit(0); }).catch(e => { console.error(e); process.exit(1); });"

